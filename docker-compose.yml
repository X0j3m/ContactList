services:

  contacts:
    image: ${DOCKER_REGISTRY-}contacts
    build:
      context: .
      dockerfile: Contacts/Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - default

  security:
    image: ${DOCKER_REGISTRY-}security
    build:
      context: .
      dockerfile: Security/Dockerfile
    depends_on:
      - db
    ports:
      - "8081:8081"
    networks:
      - default

  db:
    image: mysql:8.4.8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - default

volumes:
  db_data:


networks:
  default:
    name: contacts-network